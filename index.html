  --shadow-2:0 4px 10px rgba(38,44,96,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-3:0 12px 28px rgba(38,44,96,.12),0 2px 6px rgba(0,0,0,.06);
  --ease-out:cubic-bezier(.2,.8,.2,1);
  --font:'Objective',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
html,body{height:100%;overflow:hidden}
body{
  position:fixed;inset:0;width:100%;
  font-family:var(--font);color:var(--fg-1);background:var(--bg-soft);
  display:flex;flex-direction:column;
  overscroll-behavior:none;-webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;
}
button{font-family:var(--font);cursor:pointer;touch-action:manipulation;border:none;background:none;color:inherit}
input,textarea{font-family:var(--font);font-size:16px}/* 16px prevents iOS focus-zoom */

/* ---------- Header ---------- */
header{
  flex:0 0 auto;background:var(--encore-blue);color:#fff;
  padding:calc(6px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) 6px calc(12px + env(safe-area-inset-left));
  display:flex;align-items:center;gap:10px;z-index:60;
  box-shadow:0 1px 0 rgba(0,0,0,.12);
}
.brand{display:flex;flex-direction:column;line-height:1;flex:0 0 auto}
.brand-name{font-weight:800;font-size:16px;letter-spacing:.04em}
.brand-sub{font-size:8.5px;font-weight:700;letter-spacing:.16em;color:var(--light-blue);margin-top:2px}
#siteBtn{
  flex:1 1 auto;min-width:0;display:flex;align-items:center;gap:6px;justify-content:center;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:#fff;border-radius:var(--radius-pill);padding:7px 14px;font-size:13px;font-weight:700;
}
#siteBtn .site-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#siteBtn .caret{font-size:9px;opacity:.8;flex:0 0 auto}
#progChip{
  flex:0 0 auto;background:rgba(255,255,255,.14);border-radius:var(--radius-pill);
  padding:5px 10px;font-size:12px;font-weight:700;display:none;
}
#progChip.done{background:var(--high-vis-green);color:#264d00}
#menuBtn{flex:0 0 auto;color:#fff;padding:8px 10px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center}
#menuBtn:active{background:rgba(255,255,255,.15)}

/* ---------- Stage / canvas ---------- */
#stage{
  flex:1 1 auto;position:relative;overflow:hidden;
  touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  background-color:var(--bg-soft);
  background-image:radial-gradient(circle,#d3d7de 1.2px,transparent 1.4px);
  cursor:grab;
}
#stage.panning{cursor:grabbing}
#world{position:absolute;left:0;top:0;width:0;height:0;transform-origin:0 0;--inv:1}

/* ---------- Seat objects ---------- */
.obj{
  position:absolute;border-radius:var(--radius-md);
  border:calc(2px * var(--inv,1)) solid var(--encore-blue);
  background:rgba(19,67,150,.07);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;overflow:hidden;padding:3px;
}
.obj.office{border-color:var(--dark-blue);background:rgba(38,44,96,.10)}
.obj.confroom,.obj.huddle,.obj.reception{border-color:#5b8fd6;background:rgba(118,174,240,.16)}
.obj.breakroom,.obj.storage,.obj.restroom,.obj.copyprint,.obj.warehouse,.obj.serverroom{border-color:var(--med-grey);background:rgba(135,135,135,.10)}
.obj.door{border-color:var(--encore-grey);background:rgba(63,63,63,.40)}
.obj.door .obj-type{display:none}
.obj.door .obj-name{font-size:10px;color:#fff}
.obj.door .obj-occ{color:#ddd}
.obj.door.partial .obj-name,.obj.door.complete .obj-name{color:var(--encore-grey)}
.obj.door.partial .obj-occ,.obj.door.complete .obj-occ{color:var(--fg-2)}
.obj.partial{border-color:var(--warn-border);background:var(--warn-fill)}
.obj.complete{border-color:var(--ok-border);background:var(--ok-fill)}
.obj.selected{
  outline:calc(2.5px * var(--inv,1)) dashed var(--light-blue);
  outline-offset:calc(3px * var(--inv,1));
}
.obj-type{
  position:absolute;top:2px;left:4px;font-size:7px;font-weight:800;letter-spacing:.12em;
  color:rgba(63,63,63,.55);pointer-events:none;
}
.obj-prog{
  position:absolute;top:2px;right:2px;font-size:9px;font-weight:800;
  padding:1px 5px;border-radius:var(--radius-pill);
  background:rgba(255,255,255,.85);color:var(--fg-2);pointer-events:none;
}
.obj-prog.complete{background:var(--high-vis-green);color:#264d00}
.obj-prog.partial{background:var(--safety-orange);color:#fff}
.obj-name{font-size:12px;font-weight:700;color:var(--encore-grey);text-align:center;line-height:1.15;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.obj-occ{font-size:11px;font-weight:500;color:var(--fg-2);text-align:center;line-height:1.1;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.obj-occ.none{color:var(--fg-3);font-style:italic;font-size:10px}
.handle{
  position:absolute;
  width:calc(28px * var(--inv,1));height:calc(28px * var(--inv,1));
  transform:translate(-50%,-50%);
  background:var(--encore-blue);border:calc(3px * var(--inv,1)) solid #fff;border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
}
.handle::before{content:'';position:absolute;inset:calc(-10px * var(--inv,1))}

#emptyHint{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;padding:24px;text-align:center;
}
#emptyHint span{color:var(--fg-3);font-size:15px;line-height:1.5;max-width:340px;font-weight:500}

/* ---------- Floating controls ---------- */
#bottomBars{
  position:fixed;left:env(safe-area-inset-left);right:env(safe-area-inset-right);bottom:calc(12px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;align-items:center;gap:8px;
  z-index:40;pointer-events:none;
}
#bottomBars>*{pointer-events:auto}
#palette{
  display:flex;gap:6px;background:#fff;border:1px solid var(--border-1);
  border-radius:var(--radius-xl);padding:6px;box-shadow:var(--shadow-3);
  max-width:calc(100vw - 16px);flex-wrap:wrap;justify-content:center;
}
.pal-btn{
  padding:10px 14px;border-radius:var(--radius-lg);font-size:14px;font-weight:700;
  background:var(--encore-blue);color:#fff;min-height:44px;
}
.pal-btn:active{background:#0e3577}
.pal-btn.secondary{background:#fff;color:var(--encore-blue);border:1px solid var(--border-2)}
.pal-btn.secondary:active{background:var(--smoke-grey)}
.pal-btn.danger{background:#fff;color:var(--encore-red);border:1px solid var(--border-2)}
.pal-btn.danger:active{background:#fbecee}
.pal-btn:disabled{opacity:.4}
@media (max-width:419px){
  .pal-btn{padding:9px 10px;font-size:13px}
}
#modeSeg{
  display:flex;background:#fff;border:1px solid var(--border-1);border-radius:var(--radius-pill);
  padding:4px;box-shadow:var(--shadow-3);
}
.seg-btn{
  padding:9px 22px;border-radius:var(--radius-pill);font-size:14px;font-weight:700;
  color:var(--fg-2);min-height:42px;
}
.seg-btn.active{background:var(--encore-blue);color:#fff}
#zoomCtrls{
  position:fixed;right:calc(10px + env(safe-area-inset-right));top:calc(59px + env(safe-area-inset-top));
  display:flex;flex-direction:column;gap:6px;z-index:40;
}
.zoom-btn{
  width:44px;height:44px;border-radius:var(--radius-lg);background:#fff;
  border:1px solid var(--border-1);box-shadow:var(--shadow-2);
  font-size:20px;font-weight:700;color:var(--encore-grey);
  display:flex;align-items:center;justify-content:center;
}
.zoom-btn:active{background:var(--smoke-grey)}
.zoom-btn.fit{font-size:11px;font-weight:800;letter-spacing:.06em}

#toast{
  position:fixed;left:50%;bottom:calc(150px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);
  background:var(--encore-grey);color:#fff;font-size:13px;font-weight:600;
  padding:9px 16px;border-radius:var(--radius-pill);box-shadow:var(--shadow-3);
  opacity:0;transition:opacity .18s var(--ease-out),transform .18s var(--ease-out);
  pointer-events:none;z-index:90;max-width:88vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Bottom sheet (seat detail) ---------- */
#sheetScrim,#menuScrim{
  position:fixed;inset:0;background:rgba(38,44,96,.38);z-index:70;
  opacity:0;pointer-events:none;transition:opacity .2s var(--ease-out);
}
#sheetScrim.open,#menuScrim.open{opacity:1;pointer-events:auto}
#sheet{
  position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:560px;
  background:#fff;border-radius:var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow:0 -8px 40px rgba(38,44,96,.25);z-index:80;
  transform:translateY(105%);transition:transform .24s var(--ease-out);
  display:flex;flex-direction:column;max-height:78dvh;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
}
#sheet.open{transform:translateY(0)}
#sheet.dragging{transition:none}
.sheet-grab{flex:0 0 auto;padding:10px 0 4px;display:flex;justify-content:center;touch-action:none;cursor:grab}
.sheet-grab::before{content:'';width:42px;height:5px;border-radius:var(--radius-pill);background:var(--border-2)}
.sheet-hdr{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:2px 16px 12px;border-bottom:1px solid var(--border-1)}
.sheet-hdr-text{flex:1;min-width:0}
.sheet-type{font-size:10px;font-weight:800;letter-spacing:.14em;color:var(--encore-red)}
.sheet-title{font-size:19px;font-weight:800;color:var(--encore-grey);letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sheet-prog{
  flex:0 0 auto;font-size:12px;font-weight:800;padding:5px 11px;border-radius:var(--radius-pill);
  background:var(--smoke-grey);color:var(--fg-2);
}
.sheet-prog.complete{background:var(--high-vis-green);color:#264d00}
.sheet-prog.partial{background:var(--safety-orange);color:#fff}
.sheet-close{flex:0 0 auto;width:38px;height:38px;border-radius:50%;background:var(--smoke-grey);color:var(--fg-2);font-size:15px;font-weight:700}
.sheet-close:active{background:var(--border-2)}
.sheet-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 22px;overscroll-behavior:contain}
.f-label{display:block;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);margin:16px 0 6px}
.f-label:first-child{margin-top:0}
.f-input,.f-textarea{
  width:100%;border:1px solid var(--border-2);border-radius:var(--radius-md);
  padding:11px 12px;color:var(--fg-1);background:#fff;
}
.f-input:focus,.f-textarea:focus{outline:2px solid var(--light-blue);outline-offset:1px;border-color:var(--encore-blue)}
.f-textarea{min-height:72px;resize:vertical}
.cl-row{display:flex;align-items:center;gap:10px;min-height:46px;border-bottom:1px solid var(--border-1)}
.cl-check{
  flex:0 0 auto;width:26px;height:26px;border-radius:var(--radius-sm);
  border:2px solid var(--border-2);background:#fff;color:transparent;font-size:14px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.cl-row.done .cl-check{background:var(--ok-border);border-color:var(--ok-border);color:#fff}
.cl-text{flex:1;min-width:0;overflow-wrap:anywhere;font-size:15px;font-weight:500;color:var(--fg-1);padding:8px 0}
.cl-row.done .cl-text{color:var(--fg-3);text-decoration:line-through}
.cl-toggle{flex:1;min-width:0;display:flex;align-items:center;gap:10px;text-align:left;min-height:46px}
.cl-del{flex:0 0 auto;width:38px;height:38px;color:var(--fg-3);font-size:15px;border-radius:var(--radius-md)}
.cl-del:active{background:var(--smoke-grey);color:var(--encore-red)}
.cl-empty{font-size:13px;color:var(--fg-3);padding:10px 0;font-style:italic}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row .f-input{flex:1}
.add-btn{flex:0 0 auto;padding:0 18px;border-radius:var(--radius-md);background:var(--encore-blue);color:#fff;font-size:14px;font-weight:700;min-height:44px}
.add-btn:active{background:#0e3577}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{
  padding:8px 13px;border-radius:var(--radius-pill);border:1px solid var(--border-2);
  background:#fff;font-size:13px;font-weight:600;color:var(--encore-blue);min-height:36px;
}
.chip:active{background:var(--smoke-grey)}
.chip:disabled{color:var(--fg-3);background:var(--smoke-grey);border-color:var(--border-1)}

/* ---------- Menu ---------- */
#menu{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);
  width:min(420px,calc(100vw - 28px));max-height:min(620px,calc(100dvh - 60px));
  background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-3);z-index:80;
  display:none;flex-direction:column;overflow:hidden;
  opacity:0;transition:opacity .16s var(--ease-out),transform .16s var(--ease-out);
}
#menu.open{display:flex;opacity:1;transform:translate(-50%,-50%) scale(1)}
.menu-hdr{padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-1)}
.menu-title{font-size:17px;font-weight:800;color:var(--encore-grey)}
.menu-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 14px;overscroll-behavior:contain}
.menu-sec{font-size:10px;font-weight:800;letter-spacing:.14em;color:var(--fg-3);padding:14px 18px 4px}
.site-row{
  width:100%;display:flex;align-items:center;gap:10px;padding:12px 18px;text-align:left;
  font-size:15px;font-weight:600;color:var(--fg-1);min-height:48px;
}
.site-row:active{background:var(--bg-soft)}
.site-row .s-check{flex:0 0 20px;color:var(--encore-blue);font-weight:800;font-size:15px}
.site-row .s-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.site-row .s-count{flex:0 0 auto;font-size:12px;color:var(--fg-3);font-weight:600}
.menu-row{
  width:100%;display:flex;align-items:center;gap:10px;padding:12px 18px;text-align:left;
  font-size:14px;font-weight:600;color:var(--encore-blue);min-height:46px;
}
.menu-row:active{background:var(--bg-soft)}
.menu-row.danger{color:var(--encore-red)}
.menu-note{padding:12px 18px 4px;font-size:11.5px;color:var(--fg-3);line-height:1.5}
.menu-divider{height:1px;background:var(--border-1);margin:6px 0}
.menu-current{padding:10px 18px 2px;font-size:13px;color:var(--fg-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-current b{color:var(--fg-1)}
#menu.sites-mode{width:min(340px,calc(100vw - 28px))}
#menu.sites-mode .menu-body{max-height:min(500px,58dvh)}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 16px}
.type-btn{padding:12px 10px;border:1px solid var(--border-2);border-radius:var(--radius-lg);font-size:14px;font-weight:600;color:var(--encore-blue);background:#fff;min-height:48px}
.type-btn:active{background:var(--smoke-grey)}
</style>

<body>
<header>
  <div class="brand"><span class="brand-name">ENCORE</span><span class="brand-sub">OFFICE MAP</span></div>
  <button id="siteBtn" aria-label="Switch site"><span class="site-name" id="siteName"></span><span class="caret">&#9660;</span></button>
  <div id="progChip"></div>
  <button id="menuBtn" aria-label="Settings"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
</header>

<div id="stage">

</div>

  <div id="palette" hidden>
    <button class="pal-btn" id="addCubicleBtn">+ Cubicle</button>

    <button class="pal-btn secondary" id="undoBtn">&#8630; Undo</button>
  </div>
  <div id="paletteSel" class="" hidden></div>

    <button class="seg-btn" data-mode="layout">Layout</button>
    <button class="seg-btn" data-mode="setup">Checklist</button>
  </div>
</div>

<div id="toast"></div>

<div id="sheetScrim"></div>

  <div class="sheet-grab" id="sheetGrab"></div>

<script>
'use strict';
/* =====================================================================
   ENCORE OFFICE MAP
   Single-file, touch-first seating chart + per-seat checklist app.
   Data lives in localStorage; Export/Import moves it between devices.
   ===================================================================== */

// ---------- constants ----------
const KEY = 'encore-seatmap-v1';
const TAP_SLOP = 8;          // screen px before a touch counts as a drag
const DBLTAP_MS = 320;
const GRID = 8;              // snap grid (world units)
const MIN_W = 48, MIN_H = 40, MIN_H_DOOR = 24;
const minHFor = t => t === 'door' ? MIN_H_DOOR : MIN_H;  // only doors may be slab-thin
const SCALE_MIN = 0.15, SCALE_MAX = 6;
const TYPES = {
  cubicle:    { label: 'Cubicle',     w: 120, h: 90  },
  office:     { label: 'Office',      w: 180, h: 140 },
  confroom:   { label: 'Conf. Room',  w: 280, h: 180 },
  reception:  { label: 'Reception',   w: 200, h: 120 },
  huddle:     { label: 'Huddle',      w: 140, h: 120 },
  breakroom:  { label: 'Break Room',  w: 220, h: 160 },
  warehouse:  { label: 'Warehouse',   w: 400, h: 300 },
  serverroom: { label: 'Server Room', w: 160, h: 140 },
  storage:    { label: 'Storage',     w: 140, h: 120 },
  restroom:   { label: 'Restroom',    w: 140, h: 120 },
  copyprint:  { label: 'Copy/Print',  w: 120, h: 80  },
  door:       { label: 'Door',        w: 80,  h: 24  },
};
// everything except the two primary seat types lives behind "+ Other"
const OTHER_TYPES = ['confroom','reception','huddle','breakroom','warehouse','serverroom','storage','restroom','copyprint','door'];
const QUICK_ITEMS = ['Monitor','Second monitor','Docking station','Keyboard & mouse','Webcam','Headset','Desk phone','Power','Ethernet / port','Chair'];

// ---------- dom ----------
const $ = s => document.querySelector(s);
const stage = $('#stage'), world = $('#world');

// ---------- state ----------
let db = null;
let mode = 'layout';           // 'layout' | 'setup'
let view = { x: 0, y: 0, scale: 1 };
let selectedId = null;
let sheetObjId = null;
let sheetOpenedAt = 0;
let lastNudgeAt = 0;
let undoStacks = {};           // siteId -> [serialized objects arrays]
const pointers = new Map();    // pointerId -> {x,y,sx,sy}
let gesture = null;
let lastTap = { t: 0, x: 0, y: 0 };
let _stageRect = null;

// ---------- helpers ----------
function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2, 9)); }
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function snap(v){ return Math.round(v / GRID) * GRID; }
function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stageRect(){ if (!_stageRect) _stageRect = stage.getBoundingClientRect(); return _stageRect; }
function toStage(e){ const r = stageRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
window.addEventListener('resize', () => { _stageRect = null; });

let toastTimer = null;
function toast(msg){
  const t = $('#toast'); t.textContent = msg;
  // sit 10px above the bottom bars, however tall they currently are
  const bars = document.getElementById('bottomBars');
  if (bars) t.style.bottom = (window.innerHeight - bars.getBoundingClientRect().top + 10) + 'px';
  t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ---------- persistence ----------
function normSite(s){
  s.id = s.id || uid();
  s.name = String(s.name || 'Untitled site');
  s.counters = s.counters || { cubicle: 0, office: 0 };
  const v = s.view;
  s.view = (v && Number.isFinite(v.x) && Number.isFinite(v.y) && Number.isFinite(v.scale) &&
            v.scale >= SCALE_MIN && v.scale <= SCALE_MAX)
    ? { x: v.x, y: v.y, scale: v.scale } : null;
  s.objects = (Array.isArray(s.objects) ? s.objects : []).map(o => {
    const type = TYPES[o.type] ? o.type : 'cubicle';
    return {
    id: o.id || uid(),
    type,
    x: Number(o.x) || 0, y: Number(o.y) || 0,
    w: Math.max(MIN_W, Number(o.w) || 120), h: Math.max(minHFor(type), Number(o.h) || 90),
    label: String(o.label || 'Seat'),
    occupant: String(o.occupant || ''),
    notes: String(o.notes || ''),
    items: (Array.isArray(o.items) ? o.items : []).map(i => ({
      id: i.id || uid(), text: String(i.text || ''), done: !!i.done,
    })),
    };
  });
  return s;
}
function newSite(name){
  return { id: uid(), name, createdAt: new Date().toISOString(), objects: [], counters: { cubicle: 0, office: 0 }, view: null };
}
function load(){
  let raw = null;
  try {
    raw = localStorage.getItem(KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d || !Array.isArray(d.sites) || !d.sites.length) throw new Error('unexpected data shape');
    d.sites.forEach(normSite);
    return d;
  } catch (e) {
    console.error('load failed', e);
    // keep the unreadable payload instead of letting a fresh db overwrite it
    try { if (raw) localStorage.setItem(KEY + '.corrupt-backup', raw); } catch (_) {}
    return null;
  }
}
let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 250);
}
function flushSave(){
  clearTimeout(saveTimer); saveTimer = null;
  try { localStorage.setItem(KEY, JSON.stringify(db)); }
  catch (e) { console.error('save failed', e); toast('Could not save — storage full?'); }
}
window.addEventListener('pagehide', flushSave);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushSave(); });

function site(){ return db.sites.find(s => s.id === db.activeSiteId); }
function getObj(id){ return site().objects.find(o => o.id === id); }

// ---------- status ----------
function objStatus(o){
  const t = o.items.length;
  if (!t) return 'none';
  const d = o.items.filter(i => i.done).length;
  if (d === t) return 'complete';
  if (d > 0) return 'partial';
  return 'pending';
}

// ---------- undo (layout ops only) ----------
function undoStack(){ const id = site().id; return undoStacks[id] || (undoStacks[id] = []); }
function pushUndo(serialized){
  const st = undoStack();
  st.push(serialized !== undefined ? serialized : JSON.stringify(site().objects));
  if (st.length > 50) st.shift();
  updatePalette();
}
function doUndo(){
  if (gesture) return;
  const st = undoStack();
  if (!st.length) { toast('Nothing to undo'); return; }
  site().objects = JSON.parse(st.pop()).map(o => o); // already plain
  normSite(site());
  selectedId = null;
  save(); renderAll();
}

// ---------- view / camera ----------
function applyView(){
  world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
  world.style.setProperty('--inv', String(1 / view.scale));
  const g = 32 * view.scale;
  stage.style.backgroundSize = `${g}px ${g}px`;
  stage.style.backgroundPosition = `${view.x}px ${view.y}px`;
  const zp = $('#zoomPctBtn');
  if (zp) zp.textContent = Math.round(view.scale * 100) + '%';
  const s = site();
  if (s) { s.view = { x: view.x, y: view.y, scale: view.scale }; save(); }
}
function setView(x, y, scale){
  view.scale = clamp(scale, SCALE_MIN, SCALE_MAX);
  view.x = x; view.y = y;
  applyView();
}
function zoomAt(px, py, factor){
  const ns = clamp(view.scale * factor, SCALE_MIN, SCALE_MAX);
  const wx = (px - view.x) / view.scale, wy = (py - view.y) / view.scale;
  setView(px - wx * ns, py - wy * ns, ns);
}
function fitView(){
  const s = site(); const r = stageRect();
  let minX = 0, minY = 0, maxX = 800, maxY = 600;
  if (s.objects.length) {
    minX = Math.min(...s.objects.map(o => o.x));
    minY = Math.min(...s.objects.map(o => o.y));
    maxX = Math.max(...s.objects.map(o => o.x + o.w));
    maxY = Math.max(...s.objects.map(o => o.y + o.h));
  }
  const pad = 60;
  const w = (maxX - minX) + pad * 2, h = (maxY - minY) + pad * 2;
  const sc = clamp(Math.min(r.width / w, r.height / h), SCALE_MIN, 1.6);
  setView(
    (r.width  - (maxX - minX) * sc) / 2 - minX * sc,
    (r.height - (maxY - minY) * sc) / 2 - minY * sc,
    sc
  );
}

// ---------- gesture engine (pan / pinch / move / resize / tap) ----------
stage.addEventListener('pointerdown', onDown);
stage.addEventListener('pointermove', onMove);
stage.addEventListener('pointerup', e => onUp(e, false));
stage.addEventListener('pointercancel', e => onUp(e, true));
stage.addEventListener('contextmenu', e => e.preventDefault());
stage.addEventListener('wheel', e => {
  e.preventDefault();
  const p = toStage(e);
  const f = Math.exp(-e.deltaY * (e.ctrlKey ? 0.01 : 0.0018));
  zoomAt(p.x, p.y, f);
}, { passive: false });

function startPinch(){
  const [a, b] = [...pointers.values()];
  const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  gesture = {
    type: 'pinch',
    d0: Math.max(1, dist(a, b)),
    s0: view.scale,
    wmid: { x: (mid.x - view.x) / view.scale, y: (mid.y - view.y) / view.scale },
  };
}
function finishObjGesture(g){
  if (g && (g.type === 'move' || g.type === 'resize') && g.changed &&
      site().objects.some(o => o.id === g.o.id)) {  // seat may have been deleted mid-drag
    pushUndo(g.pre); save();
  }
}
function onDown(e){
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  e.preventDefault();
  try { stage.setPointerCapture(e.pointerId); } catch (_) {}
  _stageRect = stage.getBoundingClientRect();
  const p = toStage(e);
  pointers.set(e.pointerId, { x: p.x, y: p.y, sx: p.x, sy: p.y });

  if (pointers.size === 2) {
    finishObjGesture(gesture);   // second finger lands mid-drag → commit, go pinch
    startPinch();
    return;
  }
  if (pointers.size > 2) return; // ignore extra fingers

  const objEl = e.target.closest('.obj');
  const handleEl = e.target.closest('.handle');

  if (mode === 'layout' && handleEl) {
    const o = getObj(handleEl.dataset.id);
    const oEl = world.querySelector(`.obj[data-id="${handleEl.dataset.id}"]`);
    if (!o || !oEl) return;
    gesture = { type: 'resize', o, el: oEl, hel: handleEl, ow: o.w, oh: o.h, pre: JSON.stringify(site().objects), changed: false };
  } else if (mode === 'layout' && objEl) {
    const o = getObj(objEl.dataset.id);
    if (!o) return;
    gesture = { type: 'obj-pending', o, el: objEl, ox: o.x, oy: o.y, pre: JSON.stringify(site().objects), changed: false };
  } else {
    gesture = { type: 'pan-pending', vx: view.x, vy: view.y, tapId: (mode === 'setup' && objEl) ? objEl.dataset.id : null };
  }
}
function onMove(e){
  const pt = pointers.get(e.pointerId);
  if (!pt) return;
  const p = toStage(e);
  pt.x = p.x; pt.y = p.y;
  if (!gesture) return;

  if (gesture.type === 'pinch') {
    if (pointers.size < 2) return;
    const [a, b] = [...pointers.values()];
    const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    const ns = clamp(gesture.s0 * dist(a, b) / gesture.d0, SCALE_MIN, SCALE_MAX);
    setView(mid.x - gesture.wmid.x * ns, mid.y - gesture.wmid.y * ns, ns);
    return;
  }

  const dx = pt.x - pt.sx, dy = pt.y - pt.sy;

  if (gesture.type === 'pan-pending' || gesture.type === 'obj-pending') {
    if (Math.hypot(dx, dy) <= TAP_SLOP) return;
    if (gesture.type === 'pan-pending') {
      gesture.type = 'pan';
      stage.classList.add('panning');
    } else {
      gesture.type = 'move';
      if (selectedId !== gesture.o.id) { selectedId = gesture.o.id; renderObjects(); updatePalette(); }
      gesture.el = world.querySelector(`.obj[data-id="${gesture.o.id}"]`);
      gesture.hel = world.querySelector(`.handle[data-id="${gesture.o.id}"]`);
      if (!gesture.el) { gesture = null; return; }
    }
  }

  if (gesture.type === 'pan') {
    setView(gesture.vx + dx, gesture.vy + dy, view.scale);
  } else if (gesture.type === 'move') {
    const o = gesture.o;
    o.x = snap(gesture.ox + dx / view.scale);
    o.y = snap(gesture.oy + dy / view.scale);
    gesture.changed = true;
    gesture.el.style.left = o.x + 'px';
    gesture.el.style.top = o.y + 'px';
    if (gesture.hel) { gesture.hel.style.left = (o.x + o.w) + 'px'; gesture.hel.style.top = (o.y + o.h) + 'px'; }
  } else if (gesture.type === 'resize') {
    const o = gesture.o;
    o.w = Math.max(MIN_W, snap(gesture.ow + dx / view.scale));
    o.h = Math.max(minHFor(o.type), snap(gesture.oh + dy / view.scale));
    gesture.changed = true;
    gesture.el.style.width = o.w + 'px';
    gesture.el.style.height = o.h + 'px';
    if (gesture.hel) { gesture.hel.style.left = (o.x + o.w) + 'px'; gesture.hel.style.top = (o.y + o.h) + 'px'; }
  }
}
function onUp(e, cancelled){
  const pt = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);
  try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
  if (!gesture) { stage.classList.remove('panning'); return; }

  if (gesture.type === 'pinch') {
    if (pointers.size >= 2) { startPinch(); }         // re-anchor with remaining two
    else if (pointers.size === 1) {
      const [rp] = [...pointers.values()];
      rp.sx = rp.x; rp.sy = rp.y;
      gesture = { type: 'pan', vx: view.x, vy: view.y };
    } else { gesture = null; }
    return;
  }

  const g = gesture; gesture = null;
  stage.classList.remove('panning');

  if (cancelled) {                                    // system stole the gesture — commit safely, no tap
    finishObjGesture(g);
    if (g.type === 'move' || g.type === 'resize') renderObjects();
    return;
  }

  if (g.type === 'pan-pending' && pt) {
    const now = Date.now();
    if (g.tapId) {                                    // tap on seat in checklist mode
      openSheet(g.tapId);
      lastTap = { t: 0, x: 0, y: 0 };
    } else if (mode === 'layout' && selectedId) {     // tap empty canvas → deselect
      selectedId = null; renderObjects(); updatePalette();
      lastTap = { t: now, x: pt.x, y: pt.y };
    } else if (now - lastTap.t < DBLTAP_MS && Math.hypot(pt.x - lastTap.x, pt.y - lastTap.y) < 32) {
      zoomAt(pt.x, pt.y, view.scale > 2.5 ? 0.35 : 2); // double-tap zoom
      lastTap = { t: 0, x: 0, y: 0 };
    } else {
      lastTap = { t: now, x: pt.x, y: pt.y };
    }
  } else if (g.type === 'obj-pending') {              // tap seat in layout mode → select
    selectedId = g.o.id; renderObjects(); updatePalette();
  } else if (g.type === 'move' || g.type === 'resize') {
    finishObjGesture(g);
    renderObjects();
  }
}

// ---------- object CRUD ----------
function addObject(type){
  if (gesture) return;  // no structural edits mid-gesture
  const s = site();
  s.counters[type] = (s.counters[type] || 0) + 1;
  const def = TYPES[type];
  const r = stageRect();
  let wx = snap((r.width  / 2 - view.x) / view.scale - def.w / 2);
  let wy = snap((r.height / 2 - view.y) / view.scale - def.h / 2);
  let guard = 0;
  while (s.objects.some(o => Math.abs(o.x - wx) < 16 && Math.abs(o.y - wy) < 16) && guard++ < 40) { wx += 24; wy += 24; }
  pushUndo();
  const o = {
    id: uid(), type, x: wx, y: wy, w: def.w, h: def.h,
    label: def.label + ' ' + s.counters[type],
    occupant: '', notes: '', items: [],
  };
  s.objects.push(o);
  selectedId = o.id;
  save(); renderAll();
}
function deleteSelected(){
  if (gesture) return;
  const o = getObj(selectedId); if (!o) return;
  pushUndo();
  site().objects = site().objects.filter(x => x.id !== o.id);
  selectedId = null;
  save(); renderAll();
  toast('Deleted — tap Undo to restore');
}
function duplicateSelected(){
  if (gesture) return;
  const src = getObj(selectedId); if (!src) return;
  const s = site();
  s.counters[src.type] = (s.counters[src.type] || 0) + 1;
  pushUndo();
  const copy = {
    id: uid(), type: src.type,
    x: src.x + 24, y: src.y + 24, w: src.w, h: src.h,
    label: TYPES[src.type].label + ' ' + s.counters[src.type],
    occupant: '', notes: '',
    items: src.items.map(i => ({ id: uid(), text: i.text, done: false })),  // reuse checklist, unchecked
  };
  s.objects.push(copy);
  selectedId = copy.id;
  save(); renderAll();
}
function renameSelected(){
  if (gesture) return;
  const o = getObj(selectedId); if (!o) return;
  const n = prompt('Seat label:', o.label);
  if (n === null) return;
  const t = n.trim(); if (!t || t === o.label) return;
  pushUndo();
  o.label = t;
  save(); renderAll();
}

// ---------- rendering ----------
function renderObjects(){
  const s = site();
  world.innerHTML = '';
  for (const o of s.objects) {
    const el = document.createElement('div');
    el.className = 'obj ' + o.type;
    el.dataset.id = o.id;
    const st = objStatus(o);
    if (mode === 'setup') {
      if (st === 'complete') el.classList.add('complete');
      else if (st === 'partial') el.classList.add('partial');
    }
    if (mode === 'layout' && o.id === selectedId) el.classList.add('selected');
    el.style.left = o.x + 'px'; el.style.top = o.y + 'px';
    el.style.width = o.w + 'px'; el.style.height = o.h + 'px';

    const done = o.items.filter(i => i.done).length;
    let inner = `<span class="obj-type">${TYPES[o.type].label.toUpperCase()}</span>`;
    if (o.items.length) {
      inner += `<span class="obj-prog ${st === 'complete' ? 'complete' : (st === 'partial' ? 'partial' : '')}">${st === 'complete' ? '✓' : done + '/' + o.items.length}</span>`;
    }
    inner += `<span class="obj-name">${esc(o.label)}</span>`;
    inner += o.occupant
      ? `<span class="obj-occ">${esc(o.occupant)}</span>`
      : (mode === 'setup' && (o.type === 'cubicle' || o.type === 'office')
          ? `<span class="obj-occ none">unassigned</span>` : '');
    el.innerHTML = inner;

    world.appendChild(el);
  }
  const sel = (mode === 'layout') ? s.objects.find(o => o.id === selectedId) : null;
  if (sel) {
    // sibling of the seats, not a child — .obj has overflow:hidden which would clip it
    const h = document.createElement('div');
    h.className = 'handle';
    h.dataset.id = sel.id;
    h.style.left = (sel.x + sel.w) + 'px';
    h.style.top  = (sel.y + sel.h) + 'px';
    world.appendChild(h);
  }
  const hint = $('#emptyHint');
  hint.hidden = s.objects.length > 0;
  $('#emptyHintText').textContent = mode === 'layout'
    ? 'Tap “+ Cubicle”, “+ Office”, or “+ Other” below to place your first space. Drag to move it, use the blue corner dot to resize.'
    : 'This site is empty. Switch to Layout mode to add cubicles and offices.';
  renderHeader();
}
function renderHeader(){
  const s = site();
  $('#siteName').textContent = s.name;
  const total = s.objects.length;
  const chip = $('#progChip');
  if (!total) { chip.style.display = 'none'; }
  else {
    const complete = s.objects.filter(o => objStatus(o) === 'complete').length;
    chip.style.display = 'block';
    chip.textContent = `✓ ${complete}/${total}`;
    chip.classList.toggle('done', complete === total);
  }
}
function updatePalette(){
  const pal = $('#palette');
  pal.hidden = mode !== 'layout';
  if (mode !== 'layout') return;
  const sel = getObj(selectedId);
  pal.innerHTML = '';
  if (sel) {
    pal.appendChild(mkBtn('Rename', 'pal-btn secondary', renameSelected));
    pal.appendChild(mkBtn('Duplicate', 'pal-btn secondary', duplicateSelected));
    pal.appendChild(mkBtn('Delete', 'pal-btn danger', deleteSelected));
    pal.appendChild(mkBtn('✕', 'pal-btn secondary', () => { selectedId = null; renderObjects(); updatePalette(); }));
  } else {
    pal.appendChild(mkBtn('+ Cubicle', 'pal-btn', () => addObject('cubicle')));
    pal.appendChild(mkBtn('+ Office', 'pal-btn', () => addObject('office')));
    pal.appendChild(mkBtn('+ Other…', 'pal-btn', () => openMenu('addType')));
    const u = mkBtn('↶ Undo', 'pal-btn secondary', doUndo);
    u.disabled = !undoStack().length;
    pal.appendChild(u);
  }
}
function mkBtn(text, cls, fn){
  const b = document.createElement('button');
  b.className = cls; b.textContent = text;
  b.addEventListener('click', fn);
  return b;
}
function setMode(m){
  if (mode === m) return;
  mode = m;
  selectedId = null;
  closeSheet();
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  renderObjects(); updatePalette();
}
function renderAll(){
  renderObjects(); updatePalette(); applyView();
}

// ---------- bottom sheet (seat detail) ----------
function openSheet(id){
  const o = getObj(id); if (!o) return;
  sheetObjId = id;
  sheetOpenedAt = Date.now();
  renderSheet();
  $('#sheetScrim').classList.add('open');
  $('#sheet').classList.add('open');
}
function closeSheet(){
  if (!sheetObjId) return;
  sheetObjId = null;
  $('#sheetScrim').classList.remove('open');
  const sh = $('#sheet');
  sh.classList.remove('open');
  sh.style.transform = '';
  renderObjects();  // reflect status changes on the map
}
function renderSheet(){
  const o = getObj(sheetObjId); if (!o) return;
  $('#sheetType').textContent = TYPES[o.type].label.toUpperCase();
  $('#sheetTitle').textContent = o.label;
  updateSheetProg(o);

  const body = $('#sheetBody');
  body.innerHTML = '';

  // occupant
  body.appendChild(mkLabel('Assigned to'));
  const occ = document.createElement('input');
  occ.className = 'f-input'; occ.placeholder = 'Who sits here?';
  occ.value = o.occupant; occ.autocomplete = 'off';
  occ.addEventListener('input', () => { o.occupant = occ.value; save(); updateSheetProg(o); });
  body.appendChild(occ);

  // checklist
  body.appendChild(mkLabel('Checklist'));
  const list = document.createElement('div');
  list.id = 'clList';
  body.appendChild(list);
  renderChecklist(o, list);

  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  const inp = document.createElement('input');
  inp.className = 'f-input'; inp.placeholder = 'Add checklist item…'; inp.autocomplete = 'off';
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn'; addBtn.textContent = 'Add';
  const doAdd = () => {
    const t = inp.value.trim(); if (!t) return;
    o.items.push({ id: uid(), text: t, done: false });
    inp.value = '';
    save(); renderChecklist(o, list); updateSheetProg(o); renderChips(o, chips);
    inp.focus();
  };
  addBtn.addEventListener('click', doAdd);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } });
  addRow.appendChild(inp); addRow.appendChild(addBtn);
  body.appendChild(addRow);

  // quick-add chips
  const chips = document.createElement('div');
  chips.className = 'chips';
  body.appendChild(chips);
  renderChips(o, chips);

  // notes
  body.appendChild(mkLabel('Notes'));
  const notes = document.createElement('textarea');
  notes.className = 'f-textarea';
  notes.placeholder = 'Port numbers, issues, follow-ups…';
  notes.value = o.notes;
  notes.addEventListener('input', () => { o.notes = notes.value; save(); });
  body.appendChild(notes);
}
function mkLabel(text){
  const l = document.createElement('label');
  l.className = 'f-label'; l.textContent = text;
  return l;
}
function renderChecklist(o, list){
  list.innerHTML = '';
  if (!o.items.length) {
    const e = document.createElement('div');
    e.className = 'cl-empty';
    e.textContent = 'No items yet — add your own below or tap a quick-add chip.';
    list.appendChild(e);
    return;
  }
  for (const item of o.items) {
    const row = document.createElement('div');
    row.className = 'cl-row' + (item.done ? ' done' : '');
    const tog = document.createElement('button');
    tog.className = 'cl-toggle';
    tog.innerHTML = `<span class="cl-check">✓</span><span class="cl-text">${esc(item.text)}</span>`;
    tog.addEventListener('click', () => {
      item.done = !item.done;
      row.classList.toggle('done', item.done);
      save(); updateSheetProg(o);
    });
    const del = document.createElement('button');
    del.className = 'cl-del'; del.setAttribute('aria-label', 'Remove item');
    del.textContent = '✕';
    del.addEventListener('click', () => {
      o.items = o.items.filter(i => i.id !== item.id);
      save(); renderChecklist(o, list); updateSheetProg(o);
      const chips = $('#sheetBody .chips'); if (chips) renderChips(o, chips);
    });
    row.appendChild(tog); row.appendChild(del);
    list.appendChild(row);
  }
}
function renderChips(o, chips){
  chips.innerHTML = '';
  for (const q of QUICK_ITEMS) {
    const c = document.createElement('button');
    c.className = 'chip'; c.textContent = '+ ' + q;
    const exists = o.items.some(i => i.text.toLowerCase() === q.toLowerCase());
    c.disabled = exists;
    c.addEventListener('click', () => {
      if (o.items.some(i => i.text.toLowerCase() === q.toLowerCase())) return;
      o.items.push({ id: uid(), text: q, done: false });
      save();
      renderChecklist(o, $('#clList'));
      updateSheetProg(o);
      renderChips(o, chips);
    });
    chips.appendChild(c);
  }
}
function updateSheetProg(o){
  const el = $('#sheetProg');
  const st = objStatus(o);
  const done = o.items.filter(i => i.done).length;
  el.className = 'sheet-prog' + (st === 'complete' ? ' complete' : (st === 'partial' ? ' partial' : ''));
  el.textContent = o.items.length ? (done + '/' + o.items.length) : 'no items';
  renderHeader();
}
$('#sheetClose').addEventListener('click', closeSheet);
$('#sheetScrim').addEventListener('click', () => {
  if (Date.now() - sheetOpenedAt < 400) return;  // 2nd tap of a double-tap lands on the scrim
  closeSheet();
});

// swipe-down on grab bar closes the sheet
(function(){
  const grab = $('#sheetGrab'), sh = $('#sheet');
  let startY = null, dy = 0;
  grab.addEventListener('pointerdown', e => {
    startY = e.clientY; dy = 0;
    sh.classList.add('dragging');
    try { grab.setPointerCapture(e.pointerId); } catch (_) {}
  });
  grab.addEventListener('pointermove', e => {
    if (startY === null) return;
    dy = Math.max(0, e.clientY - startY);
    sh.style.transform = `translateY(${dy}px)`;
  });
  const end = () => {
    if (startY === null) return;
    sh.classList.remove('dragging');
    if (dy > 70) closeSheet();
    else sh.style.transform = '';
    startY = null;
  };
  grab.addEventListener('pointerup', end);
  grab.addEventListener('pointercancel', end);
})();

// ---------- menu (sites & data) ----------
let menuMode = 'settings';
function openMenu(m){
  menuMode = m || 'settings';
  renderMenu();
  $('#menu').classList.toggle('sites-mode', menuMode === 'sites');
  $('#menuScrim').classList.add('open');
  $('#menu').classList.add('open');
}
function closeMenu(){
  $('#menuScrim').classList.remove('open');
  $('#menu').classList.remove('open');
}
$('#menuBtn').addEventListener('click', () => openMenu('settings'));
$('#siteBtn').addEventListener('click', () => openMenu('sites'));
$('#menuClose').addEventListener('click', closeMenu);
$('#menuScrim').addEventListener('click', closeMenu);

function renderMenu(){
  $('#menuTitle').textContent =
    menuMode === 'sites' ? 'Sites' : (menuMode === 'addType' ? 'Add a space' : 'Settings');
  const body = $('#menuBody');
  body.innerHTML = '';

  if (menuMode === 'sites') {
    const sorted = [...db.sites].sort((a, b) =>
      a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    for (const s of sorted) {
      const row = document.createElement('button');
      row.className = 'site-row';
      row.innerHTML =
        `<span class="s-check">${s.id === db.activeSiteId ? '✓' : ''}</span>` +
        `<span class="s-name">${esc(s.name)}</span>` +
        `<span class="s-count">${s.objects.length} seat${s.objects.length === 1 ? '' : 's'}</span>`;
      row.addEventListener('click', () => { switchSite(s.id); closeMenu(); });
      body.appendChild(row);
    }
    return;
  }

  if (menuMode === 'addType') {
    const grid = document.createElement('div');
    grid.className = 'type-grid';
    for (const t of OTHER_TYPES) {
      const b = document.createElement('button');
      b.className = 'type-btn';
      b.textContent = TYPES[t].label;
      b.addEventListener('click', () => { closeMenu(); addObject(t); });
      grid.appendChild(b);
    }
    body.appendChild(grid);
    return;
  }

  // settings
  const cur = document.createElement('div');
  cur.className = 'menu-current';
  cur.innerHTML = `Current site: <b>${esc(site().name)}</b>`;
  body.appendChild(cur);

  const sec1 = document.createElement('div');
  sec1.className = 'menu-sec'; sec1.textContent = 'SITE';
  body.appendChild(sec1);
  body.appendChild(mkMenuRow('+ New site', '', () => {
    const n = prompt('Site name:', 'New site');
    if (n === null) return;
    const s = newSite(n.trim() || 'New site');
    db.sites.push(s);
    switchSite(s.id);
    setMode('layout');
    closeMenu();
  }));
  body.appendChild(mkMenuRow('Rename current site', '', () => {
    const s = site();
    const n = prompt('Site name:', s.name);
    if (n === null || !n.trim()) return;
    s.name = n.trim();
    save(); renderHeader(); renderMenu();
  }));
  body.appendChild(mkMenuRow('Duplicate current site', '', () => {
    const src = site();
    const copy = normSite(JSON.parse(JSON.stringify(src)));
    copy.id = uid();
    copy.name = src.name + ' (copy)';
    db.sites.push(copy);
    switchSite(copy.id);
    closeMenu();
    toast('Site duplicated');
  }));
  body.appendChild(mkMenuRow('Delete current site…', 'danger', () => {
    const s = site();
    if (!confirm(`Delete "${s.name}" and all its data? This cannot be undone.`)) return;
    db.sites = db.sites.filter(x => x.id !== s.id);
    delete undoStacks[s.id];
    if (!db.sites.length) db.sites.push(newSite('New site'));
    switchSite(db.sites[0].id);
    closeMenu();
    toast('Site deleted');
  }));

  const div1 = document.createElement('div'); div1.className = 'menu-divider'; body.appendChild(div1);
  const sec2 = document.createElement('div');
  sec2.className = 'menu-sec'; sec2.textContent = 'DATA';
  body.appendChild(sec2);
  body.appendChild(mkMenuRow('Export this site (JSON)', '', () => { exportSites([site()]); }));
  body.appendChild(mkMenuRow('Export all sites (JSON)', '', () => { exportSites(db.sites); }));
  body.appendChild(mkMenuRow('Import from file…', '', () => { $('#importFile').click(); }));

  const note = document.createElement('div');
  note.className = 'menu-note';
  note.textContent = 'Data is stored locally on this device. Use Export to back up or move a site to another device.';
  body.appendChild(note);
}
function mkMenuRow(text, extraCls, fn){
  const b = document.createElement('button');
  b.className = 'menu-row' + (extraCls ? ' ' + extraCls : '');
  b.textContent = text;
  b.addEventListener('click', fn);
  return b;
}
function switchSite(id){
  flushSave();
  closeSheet();
  db.activeSiteId = id;
  selectedId = null;
  const s = site();
  const targetView = s.view ? { ...s.view } : null;  // renderAll → applyView overwrites s.view
  renderAll();
  requestAnimationFrame(() => {
    _stageRect = null;
    if (targetView) setView(targetView.x, targetView.y, targetView.scale);
    else fitView();
  });
  save();
}

// ---------- export / import ----------
function exportSites(sites){
  const payload = {
    app: 'encore-office-map', version: 1,
    exportedAt: new Date().toISOString(),
    sites: JSON.parse(JSON.stringify(sites)),
  };
  const name = (sites.length === 1 ? sites[0].name : 'all-sites')
    .replace(/[^\w\- ]+/g, '').trim().replace(/\s+/g, '-').toLowerCase() || 'seatmap';
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `officemap-${name}-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 2000);
  toast('Exported');
}
$('#importFile').addEventListener('change', e => {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      let incoming = [];
      if (data && Array.isArray(data.sites)) incoming = data.sites;
      else if (data && Array.isArray(data.objects)) incoming = [data];   // a single exported site
      else throw new Error('Unrecognized file format');
      if (!incoming.length) throw new Error('No sites in file');
      const added = incoming.map(s => { const n = normSite(JSON.parse(JSON.stringify(s))); n.id = uid(); return n; });
      db.sites.push(...added);
      switchSite(added[0].id);
      closeMenu();
      toast(`Imported ${added.length} site${added.length === 1 ? '' : 's'}`);
    } catch (err) {
      console.error(err);
      toast('Import failed: ' + err.message);
    }
  };
  reader.readAsText(f);
});

// ---------- top-level wiring ----------
document.querySelectorAll('.seg-btn').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
$('#zoomInBtn').addEventListener('click', () => { const r = stageRect(); zoomAt(r.width / 2, r.height / 2, 1.35); });
$('#zoomOutBtn').addEventListener('click', () => { const r = stageRect(); zoomAt(r.width / 2, r.height / 2, 1 / 1.35); });
$('#zoomFitBtn').addEventListener('click', () => { _stageRect = null; fitView(); });
$('#zoomPctBtn').addEventListener('click', () => { const r = stageRect(); zoomAt(r.width / 2, r.height / 2, 1 / view.scale); });

// keyboard niceties (desktop)
document.addEventListener('keydown', e => {
  const typing = /^(INPUT|TEXTAREA)$/.test(document.activeElement && document.activeElement.tagName);
  if (e.key === 'Escape') {
    if (sheetObjId) closeSheet();
    else if ($('#menu').classList.contains('open')) closeMenu();
    else if (selectedId) { selectedId = null; renderObjects(); updatePalette(); }
    return;
  }
  if (typing) return;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { if (mode === 'layout') { e.preventDefault(); doUndo(); } return; }
  if (mode !== 'layout' || !selectedId) return;
  const o = getObj(selectedId); if (!o) return;
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); return; }
  const step = e.shiftKey ? 32 : GRID;
  const pre = JSON.stringify(site().objects);
  let moved = false;
  if (e.key === 'ArrowLeft')  { o.x -= step; moved = true; }
  if (e.key === 'ArrowRight') { o.x += step; moved = true; }
  if (e.key === 'ArrowUp')    { o.y -= step; moved = true; }
  if (e.key === 'ArrowDown')  { o.y += step; moved = true; }
  if (moved) {
    e.preventDefault();
    if (Date.now() - lastNudgeAt > 900) pushUndo(pre);  // one undo step per burst of nudges
    lastNudgeAt = Date.now();
    save(); renderObjects();
  }
});

// block Safari's legacy pinch-gesture page zoom
['gesturestart', 'gesturechange', 'gestureend'].forEach(t =>
  document.addEventListener(t, e => e.preventDefault(), { passive: false }));

// ---------- init ----------
(function init(){
  db = load();
  if (!db) {
    const s = newSite('My office');
    db = { sites: [s], activeSiteId: s.id };
  }
  if (!site()) db.activeSiteId = db.sites[0].id;
  mode = site().objects.length ? 'setup' : 'layout';
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  const s0 = site();
  const targetView = s0.view ? { ...s0.view } : null;  // renderAll → applyView overwrites s.view
  renderAll();
  requestAnimationFrame(() => {
    _stageRect = null;
    if (targetView) setView(targetView.x, targetView.y, targetView.scale);
    else fitView();
  });
})();
</script>
